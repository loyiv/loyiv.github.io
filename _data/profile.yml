short_bio: >-
  <p>
    I am an undergraduate at <strong>Central South University</strong>. I am currently a Research Assistant at
    <a href="https://polyunlp.github.io/" target="_blank">The Hong Kong Polytechnic University (PolyU NLP Lab)</a>,
    supervised by <a href="https://www4.comp.polyu.edu.hk/~cswjli/" target="_blank">Prof. Maggie Wenjie Li</a>.
  </p>
  <p>
    My research focuses on long-horizon agent planning by integrating LLM agents, embodied agents,
    reinforcement learning, and world models. I collaborate with
    <a href="https://iwangjian.github.io/" target="_blank">Jian Wang</a> on agent research.
  </p>
  <p>
    My latest CV is available
    <a href="/assets/loyiv.pdf" target="_blank">here</a> (Jun. 2026).
  </p>

