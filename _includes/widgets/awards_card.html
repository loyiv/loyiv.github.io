<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-4">
                <section class="profile-timeline-section profile-awards-section-full">
                    <h6>Honors & Awards</h6>
                    <ul class="list-unstyled small mb-0 profile-awards-list">
                        {% for item in site.data.profile.awards %}
                        <li class="profile-award-item">
                            <div class="profile-award-name">{{ item.name }}</div>
                            <div class="profile-award-date"><em>{{ item.date }}</em></div>
                        </li>
                        {% endfor %}
                    </ul>
                </section>
            </div>
        </div>
    </div>
</div>
